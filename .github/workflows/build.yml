name: Build NanoSwift IPK

permissions:
  contents: write

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          MATRIX=$(jq -c '
            [range(0; length; 8) as $i | .[$i:$i+8]]
          ' sdk_list.json)

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      # ⭐ 每个 shard 独立缓存 key（你要求的版本）
      - uses: actions/cache@v4
        with:
          path: ~/.cache/openwrt-sdk
          key: sdk-${{ hashFiles('sdk_list.json') }}-${{ strategy.job-index }}
          restore-keys: |
            sdk-${{ hashFiles('sdk_list.json') }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential xz-utils jq wget

      - name: Build SDK shard
        run: |
          mkdir -p output
          WORKSPACE=$(pwd)
          PKG_NAME="luci-app-nanoswift"

          echo '${{ toJson(matrix.shard) }}' | jq -c '.[]' | while read item; do
            NAME=$(echo "$item" | jq -r '.name')
            URL=$(echo "$item" | jq -r '.url')

            echo "=== Building for $NAME ==="

            CACHE_DIR="$HOME/.cache/openwrt-sdk/$NAME"
            mkdir -p "$CACHE_DIR"
            SDK_TAR="$CACHE_DIR/sdk.tar.xz"

            if [ -f "$SDK_TAR" ]; then
              echo "[CACHE HIT] $NAME"
            else
              echo "[CACHE MISS] $NAME"
              wget -q "$URL" -O "$SDK_TAR.tmp" || { echo "[FAIL] $NAME - download error"; continue; }
              mv "$SDK_TAR.tmp" "$SDK_TAR"
            fi

            TMP_DIR=$(mktemp -d)
            cd "$TMP_DIR"
            tar -xf "$SDK_TAR"

            SDK_DIR=$(ls -d openwrt-sdk-* | head -1)

            mkdir -p "$SDK_DIR/package/$PKG_NAME"
            cp -r "$WORKSPACE/$PKG_NAME"/* "$SDK_DIR/package/$PKG_NAME/"

            cd "$SDK_DIR"

            echo "=== Fixing feeds ==="
            sed -i '/src-git luci /d' feeds.conf.default
            sed -i '/src-git packages /d' feeds.conf.default

            echo "src-git luci https://github.com/openwrt/luci.git;openwrt-23.05" >> feeds.conf.default
            echo "src-git packages https://github.com/openwrt/packages.git;openwrt-23.05" >> feeds.conf.default

            retry() {
              local n=0
              local try=5
              until [ $n -ge $try ]
              do
                "$@" && break
                n=$((n+1))
                echo "Retry $n/$try..."
                sleep 3
              done
              [ $n -lt $try ]
            }

            echo "=== Updating feeds with retry ==="
            retry ./scripts/feeds update luci -f --depth=1 || { echo "FATAL: luci feed failed"; exit 1; }
            retry ./scripts/feeds update packages -f --depth=1 || { echo "FATAL: packages feed failed"; exit 1; }

            ./scripts/feeds install -a

            touch .config
            make defconfig 2>/dev/null

            make package/$PKG_NAME/compile -j$(nproc) V=s ARCH_NAME="$NAME" 2>&1 | tail -5

            IPK=$(find bin/packages -name "${PKG_NAME}*.ipk" | head -1)
            if [ -n "$IPK" ]; then
              cp "$IPK" "$WORKSPACE/output/"
              echo "[OK] $NAME"
            else
              echo "[FAIL] $NAME - build error"
            fi

            cd "$WORKSPACE"
            rm -rf "$TMP_DIR"
          done

          echo "=== Shard complete ==="
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipks-shard-${{ strategy.job-index }}
          path: output/*.ipk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-ipks
          pattern: ipks-shard-*
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          COUNT=1
          TAG="v${DATE}"
          while git ls-remote --tags origin | grep -q "refs/tags/${TAG}"; do
            COUNT=$((COUNT+1))
            TAG="v${DATE}-${COUNT}"
          done
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: all-ipks/*.ipk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
