name: Build NanoSwift IPK/APK

permissions:
  contents: write

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix_23: ${{ steps.set-matrix.outputs.matrix_23 }}
      matrix_25: ${{ steps.set-matrix.outputs.matrix_25 }}
    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          SDK_23=$(jq -c '[.[] | select(.url | contains("23.05"))] | sort_by(.name)' sdk_list.json)
          SDK_25=$(jq -c '[.[] | select(.url | contains("25."))] | sort_by(.name)' sdk_list.json)

          MATRIX_23=$(echo "$SDK_23" | jq -c '[range(0; length; 10) as $i | .[$i:$i+10]]')
          MATRIX_25=$(echo "$SDK_25" | jq -c '[range(0; length; 10) as $i | .[$i:$i+10]]')

          echo "matrix_23=$MATRIX_23" >> $GITHUB_OUTPUT
          echo "matrix_25=$MATRIX_25" >> $GITHUB_OUTPUT

  build-23:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix_23) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/openwrt-sdk
          key: sdk-23-${{ hashFiles('sdk_list.json') }}-${{ strategy.job-index }}
          restore-keys: |
            sdk-23-${{ hashFiles('sdk_list.json') }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential xz-utils jq wget zstd

      - name: Build 23.05 SDK shard
        run: |
          mkdir -p output
          WORKSPACE=$(pwd)
          PKG_NAME="luci-app-nanoswift"

          echo '${{ toJson(matrix.shard) }}' | jq -c '.[]' | while read item; do
            NAME=$(echo "$item" | jq -r '.name')
            URL=$(echo "$item" | jq -r '.url')

            echo "=== [23.05] Building for $NAME ==="

            CACHE_DIR="$HOME/.cache/openwrt-sdk/$NAME"
            mkdir -p "$CACHE_DIR"
            SDK_TAR="$CACHE_DIR/sdk.tar.xz"

            if [ ! -f "$SDK_TAR" ]; then
              wget -q "$URL" -O "$SDK_TAR.tmp" || continue
              mv "$SDK_TAR.tmp" "$SDK_TAR"
            fi

            TMP_DIR=$(mktemp -d)
            cd "$TMP_DIR"
            tar -xf "$SDK_TAR"

            SDK_DIR=$(ls -d openwrt-sdk-* | head -1)

            mkdir -p "$SDK_DIR/package/$PKG_NAME"
            cp -r "$WORKSPACE/$PKG_NAME"/* "$SDK_DIR/package/$PKG_NAME/"

            cd "$SDK_DIR"

            echo "=== [23.05] Skip feeds ==="

            touch .config
            make defconfig

            make package/$PKG_NAME/compile -j$(nproc) V=s ARCH_NAME="$NAME"

            find bin/packages -name "${PKG_NAME}*.ipk" -exec cp {} "$WORKSPACE/output/" \;

            cd "$WORKSPACE"
            rm -rf "$TMP_DIR"
          done

          echo "=== [23.05] Shard complete ==="
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipks-23-shard-${{ strategy.job-index }}
          path: output/*.ipk

  build-25:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.matrix_25) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.cache/openwrt-sdk-25
          key: sdk-25-${{ hashFiles('sdk_list.json') }}-${{ strategy.job-index }}
          restore-keys: |
            sdk-25-${{ hashFiles('sdk_list.json') }}-

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential xz-utils jq wget zstd

      - name: Build 25.xx SDK shard
        run: |
          mkdir -p output
          WORKSPACE=$(pwd)
          PKG_NAME="luci-app-nanoswift"

          echo '${{ toJson(matrix.shard) }}' | jq -c '.[]' | while read item; do
            NAME=$(echo "$item" | jq -r '.name')
            URL=$(echo "$item" | jq -r '.url')

            echo "=== [25.xx] Building for $NAME ==="

            CACHE_DIR="$HOME/.cache/openwrt-sdk-25/$NAME"
            mkdir -p "$CACHE_DIR"
            SDK_TAR="$CACHE_DIR/sdk.tar.zst"

            if [ ! -f "$SDK_TAR" ]; then
              wget -q "$URL" -O "$SDK_TAR.tmp" || continue
              mv "$SDK_TAR.tmp" "$SDK_TAR"
            fi

            TMP_DIR=$(mktemp -d)
            cd "$TMP_DIR"

            zstd -d "$SDK_TAR" -o sdk.tar
            tar -xf sdk.tar

            SDK_DIR=$(ls -d openwrt-sdk-* | head -1)

            mkdir -p "$SDK_DIR/package/$PKG_NAME"
            cp -r "$WORKSPACE/$PKG_NAME"/* "$SDK_DIR/package/$PKG_NAME/"

            cd "$SDK_DIR"

            echo "=== [25.xx] Skip feeds ==="

            touch .config
            make defconfig

            make package/$PKG_NAME/compile -j$(nproc) V=s ARCH_NAME="$NAME"

            # 25.xx APK：手动按架构重命名，避免互相覆盖
            find bin/packages -name "${PKG_NAME}*.apk" -exec sh -c '
              src="$1"
              arch="$2"
              work="$3"
              base="$(basename "$src")"
              new="${base%.apk}_${arch}.apk"
              cp "$src" "$work/output/$new"
            ' _ {} "$NAME" "$WORKSPACE" \;

            cd "$WORKSPACE"
            rm -rf "$TMP_DIR"
          done

          echo "=== [25.xx] Shard complete ==="
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipks-25-shard-${{ strategy.job-index }}
          path: output/*.apk

  release:
    needs: [build-23, build-25]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-packages
          pattern: ipks-*
          merge-multiple: true

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +'%Y%m%d')
          COUNT=1
          TAG="v${DATE}"
          while git ls-remote --tags origin | grep -q "refs/tags/${TAG}"; do
            COUNT=$((COUNT+1))
            TAG="v${DATE}-${COUNT}"
          done
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: |
            all-packages/*.ipk
            all-packages/*.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

